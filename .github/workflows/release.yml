name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # OIDC trusted publishing requires npm >= 11.5.1; the bundled npm is older.
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: "chore: release raqam"
          commit: "chore: release raqam"
        # No NPM_TOKEN: publishing uses npm OIDC trusted publishing (configured on
        # npmjs.com for 47vigen/raqam via release.yml). id-token: write is granted above.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
