name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much context as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? What use case is not covered today?
      placeholder: "When I use numra for a financial app, I can't do X because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature and ideally how the API would look.
      placeholder: |
        Add a `stripGroupingSeparator` prop that removes grouping separators
        from the copied value when `onCopy` fires.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative approaches have you tried?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, or related issues.
