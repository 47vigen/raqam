name: Bug Report
description: Something isn't working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: numra version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React version
      placeholder: e.g. 18.3.0 or 19.1.0
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / Runtime
      placeholder: e.g. Chrome 123, Safari 17, Node 20
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Render `<NumberField.Root locale="en-US" ...>`
        2. Type "1234"
        3. Press Backspace
        4. Cursor jumps to wrong position
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Code snippet, screenshots, or any other context.
